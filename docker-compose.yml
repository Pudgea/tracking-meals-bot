services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: diet-bot:${IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: diet-bot
    env_file:
      - path: .env
        required: false
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: ${DATABASE_URL:-postgresql://dietbot:${POSTGRES_PASSWORD}@db:5432/dietbot}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dietbot
      POSTGRES_USER: dietbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dietbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
